# Disable components we do not need for a simple load test
alertmanager:
  enabled: false
kubeStateMetrics:
  enabled: false

# Strip down Prometheus to be lightweight and highly responsive
prometheus:
  prometheusSpec:
    # Reduced scrape interval to capture fast data during a 60s test
    scrapeInterval: "5s"
    # Massively reduced retention (default is 15 days, we only need 1 hour)
    retention: "1h"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"

# Restrict Grafana memory usage
grafana:
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "100m"
  # Expose Grafana on a NodePort so we can view it from Windows
  service:
    type: NodePort
    nodePort: 32000
